<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生態分類大挑戰</title>
  
  <!-- 引入 Tailwind CSS 進行樣式排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 以在瀏覽器中解析 JSX 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 自定義動畫樣式 -->
  <style>
    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }
    .animate-shake {
      animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-green-50 to-blue-50 font-sans text-gray-800 min-h-screen">
  
  <!-- React 應用的掛載點 -->
  <div id="root"></div>

  <!-- 遊戲主要程式碼 -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // 定義生態系資料
    const ECOSYSTEMS = [
      { id: 'desert', name: '沙漠生態系', icon: '🏜️', bgClass: 'bg-yellow-100 hover:bg-yellow-200 border-yellow-400', textClass: 'text-yellow-800' },
      { id: 'grassland', name: '草原生態系', icon: '🌾', bgClass: 'bg-lime-100 hover:bg-lime-200 border-lime-400', textClass: 'text-lime-800' },
      { id: 'tundra', name: '凍原生態系', icon: '❄️', bgClass: 'bg-blue-50 hover:bg-blue-100 border-blue-300', textClass: 'text-blue-800' },
      { id: 'forest', name: '森林生態系', icon: '🌳', bgClass: 'bg-green-100 hover:bg-green-200 border-green-500', textClass: 'text-green-800' },
      { id: 'estuary', name: '河口生態系', icon: '🦀', bgClass: 'bg-teal-100 hover:bg-teal-200 border-teal-500', textClass: 'text-teal-900' },
      { id: 'freshwater', name: '淡水生態系', icon: '🏞️', bgClass: 'bg-cyan-100 hover:bg-cyan-200 border-cyan-400', textClass: 'text-cyan-900' },
      { id: 'marine', name: '海洋生態系', icon: '🐋', bgClass: 'bg-blue-200 hover:bg-blue-300 border-blue-600', textClass: 'text-blue-900' },
    ];

    // 定義生物資料
    const INITIAL_ORGANISMS = [
      { id: 1, name: '仙人掌', ecosystem: 'desert', image: '4.png', emoji: '🌵', feature: '莖演化成肥厚多汁以儲存水分，葉針狀以減少水分散失。' },
      { id: 2, name: '跳鼠', ecosystem: 'desert', image: '5.png', emoji: '🐁', feature: '後肢發達有力，善於跳躍，能快速躲避天敵，夜行性。' },
      { id: 3, name: '耳廓狐', ecosystem: 'desert', image: '21.png', emoji: '🦊', feature: '擁有巨大的耳朵，有助於散熱和偵測獵物聲音。' },
      { id: 4, name: '駱駝', ecosystem: 'desert', image: '22.png', emoji: '🐪', feature: '背上有駝峰儲存脂肪，耐飢渴，腳掌寬大適合在沙地行走。' },
      { id: 5, name: '草', ecosystem: 'grassland', image: '24.png', emoji: '🌱', feature: '根系發達緊抓土壤，葉片狹長，是草原生態系的基石。' },
      { id: 6, name: '斑馬', ecosystem: 'grassland', image: '23.png', emoji: '🦓', feature: '身上有獨特的黑白條紋，群體行動時有助於混淆掠食者的視覺。' },
      { id: 7, name: '獅子', ecosystem: 'grassland', image: '25.png', emoji: '🦁', feature: '群居的大型貓科動物，雄獅有濃密的鬃毛，是草原頂級掠食者。' },
      { id: 8, name: '蹬羚', ecosystem: 'grassland', image: '6.png', emoji: '🦌', feature: '善於奔跑，行動敏捷，警覺性高，多數種類頭上有角。' },
      { id: 9, name: '北極熊', ecosystem: 'tundra', image: '26.png', emoji: '🐻‍❄️', feature: '體型巨大的肉食性動物，厚厚的皮毛和脂肪層能禦寒，善泳。' },
      { id: 10, name: '馴鹿', ecosystem: 'tundra', image: '馴鹿.png', emoji: '🦌', feature: '雌雄皆有角，蹄寬大，適應在雪地和苔原行走尋找食物。' },
      { id: 11, name: '北極狐', ecosystem: 'tundra', image: '3.png', emoji: '🦊', feature: '毛色隨季節改變，冬季白色，夏季青灰色，耳朵短小以減少熱量散失。' },
      { id: 12, name: '馬來貘', ecosystem: 'forest', image: '7.png', emoji: '🦡', feature: '身體黑白兩色，鼻子延長呈短鼻管狀，善於游泳，夜行性。' },
      { id: 13, name: '馬來虎', ecosystem: 'forest', image: '27.png', emoji: '🐅', feature: '現存體型最小的老虎亞種，身上的條紋較窄且密集，善於伏擊。' },
      { id: 14, name: '香蒲', ecosystem: 'freshwater', image: '9.png', emoji: '🌾', feature: '挺水植物，花序呈蠟燭狀，常見於水邊濕地，能淨化水質。' },
      { id: 15, name: '鯉魚', ecosystem: 'freshwater', image: '10.png', emoji: '🐟', feature: '適應力強，底棲雜食性魚類，嘴邊有鬚，喜歡在緩慢水域活動。' },
      { id: 17, name: '台灣產頷魚', ecosystem: 'freshwater', image: '11.png', emoji: '🐠', feature: '俗稱「苦花」，嘴巴位置較低，以刮食石頭上的藻類為生。' },
      { id: 18, name: '翠鳥', ecosystem: 'freshwater', image: '12.png', emoji: '🐦', feature: '羽毛色彩鮮豔，以快速俯衝入水中捕魚為食，飛行速度快。' },
      { id: 19, name: '水筆仔', ecosystem: 'estuary', image: '13.png', emoji: '🌿', feature: '紅樹林植物，具有胎生苗和支持根的特性，適應河口鹽度變化。' },
      { id: 20, name: '招潮蟹', ecosystem: 'estuary', image: '14.png', emoji: '🦀', feature: '雄蟹有一隻巨大的螯，會揮舞大螯求偶或示威，退潮時活動。' },
      { id: 21, name: '小白鷺', ecosystem: 'estuary', image: '15.png', emoji: '🦩', feature: '全身白色羽毛，嘴和腳是黑色，腳趾黃色，常在淺水區覓食魚蝦。' },
      { id: 22, name: '石蓴', ecosystem: 'marine', image: '16.png', emoji: '🥬', feature: '常見的綠色海藻，片狀藻體，附著在海岸礁石上，是許多生物的食物。' },
      { id: 23, name: '藤壺', ecosystem: 'marine', image: '17.png', emoji: '🐚', feature: '有石灰質外殼，附著在岩石、船底或鯨魚身上，濾食海水中的浮游生物。' },
      { id: 24, name: '海帶', ecosystem: 'marine', image: '18.png', emoji: '🌿', feature: '大型褐藻，生長在冷溫帶海洋中，藻體呈帶狀，富含碘。' },
      { id: 25, name: '小丑魚', ecosystem: 'marine', image: '20.png', emoji: '🐠', feature: '體色鮮豔，與海葵有共生關係，體表黏液能免受海葵毒刺傷害。' },
      { id: 26, name: '旅鼠', ecosystem: 'tundra', image: '1.png', emoji: '🐹', feature: '小型囓齒動物，適應寒冷氣候，有著厚厚的皮毛，是許多極地掠食者的食物。' },
      { id: 27, name: '蘚苔', ecosystem: 'tundra', image: '2.png', emoji: '🌿', feature: '低矮的無維管束植物，能貼地生長以避開強風，是凍原地區重要的生產者。' },
    ];

    // Fisher-Yates 洗牌演算法
    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    function App() {
      const [organisms, setOrganisms] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [placedOrganisms, setPlacedOrganisms] = useState({});
      const [score, setScore] = useState(0);
      const [mistakes, setMistakes] = useState(0);
      const [feedback, setFeedback] = useState(null);
      const [shake, setShake] = useState(false);
      const [isGameOver, setIsGameOver] = useState(false);
      const [imageError, setImageError] = useState(false); // 新增：圖片載入失敗狀態

      // 初始化遊戲
      useEffect(() => {
        startGame();
      }, []);

      // 當切換到下一個生物時，重置圖片錯誤狀態
      useEffect(() => {
        setImageError(false);
      }, [currentIndex]);

      const startGame = () => {
        setOrganisms(shuffleArray(INITIAL_ORGANISMS));
        setCurrentIndex(0);
        setPlacedOrganisms({});
        setScore(0);
        setMistakes(0);
        setFeedback(null);
        setIsGameOver(false);
        
        // 初始化空的分群
        const initialPlaced = {};
        ECOSYSTEMS.forEach(eco => {
          initialPlaced[eco.id] = [];
        });
        setPlacedOrganisms(initialPlaced);
      };

      const handleEcosystemSelect = (ecosystemId) => {
        if (isGameOver || feedback) return; // 避免重複點擊

        const currentOrganism = organisms[currentIndex];

        if (currentOrganism.ecosystem === ecosystemId) {
          // 答對了
          setFeedback({ type: 'success', message: '答對了！' });
          setScore(s => s + 1);
          
          setPlacedOrganisms(prev => ({
            ...prev,
            [ecosystemId]: [...prev[ecosystemId], currentOrganism]
          }));

          setTimeout(() => {
            setFeedback(null);
            if (currentIndex + 1 < organisms.length) {
              setCurrentIndex(c => c + 1);
            } else {
              setIsGameOver(true);
            }
          }, 800);
        } else {
          // 答錯了
          setFeedback({ type: 'error', message: '再想一下喔！' });
          setMistakes(m => m + 1);
          setShake(true);
          
          setTimeout(() => {
            setFeedback(null);
            setShake(false);
          }, 800);
        }
      };

      const currentOrganism = organisms[currentIndex];

      return (
        <div className="p-4 md:p-8">
          <div className="max-w-5xl mx-auto">
            
            {/* 標題與計分板 */}
            <header className="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-4 rounded-2xl shadow-sm">
              <h1 className="text-2xl md:text-3xl font-bold text-green-700 flex items-center gap-2">
                🌍 生態系分類大挑戰
              </h1>
              <div className="flex gap-4 mt-4 md:mt-0 font-medium">
                <div className="bg-green-100 text-green-800 px-4 py-2 rounded-lg">
                  進度: {currentIndex} / {organisms.length}
                </div>
                <div className="bg-red-100 text-red-800 px-4 py-2 rounded-lg">
                  錯誤: {mistakes}
                </div>
              </div>
            </header>

            {/* 遊戲結束畫面 */}
            {isGameOver ? (
              <div className="bg-white rounded-3xl shadow-xl p-10 text-center transform transition-all">
                <div className="text-6xl mb-4">🎉</div>
                <h2 className="text-3xl font-bold text-gray-800 mb-4">恭喜完成分類！</h2>
                <p className="text-lg text-gray-600 mb-8">
                  你成功將 {organisms.length} 種生物送回牠們的生態系家園。<br/>
                  總共嘗試錯誤了 {mistakes} 次。
                </p>
                <button 
                  onClick={startGame}
                  className="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-transform hover:scale-105 active:scale-95"
                >
                  再玩一次
                </button>
              </div>
            ) : (
              /* 遊戲進行中畫面 */
              <div className="space-y-8">
                
                {/* 題目區 (圖卡) */}
                <div className="flex flex-col items-center justify-center relative">
                  <div className="text-gray-500 font-medium mb-2">請將下方的生物送回正確的生態系：</div>
                  
                  {currentOrganism && (
                    <div 
                      className={`
                        w-64 md:w-80 bg-white border-4 border-gray-100 rounded-3xl shadow-lg p-4
                        flex flex-col items-center justify-center transition-transform duration-300
                        ${shake ? 'animate-shake border-red-400' : 'hover:scale-105'}
                        ${feedback?.type === 'success' ? 'scale-0 opacity-0' : 'scale-100 opacity-100'}
                      `}
                    >
                      {!imageError ? (
                        <img 
                          src={`./${currentOrganism.image}`} 
                          alt={currentOrganism.name} 
                          className="w-32 h-32 md:w-48 md:h-48 object-contain mb-2"
                          onError={() => setImageError(true)} 
                        />
                      ) : (
                        <span className="text-6xl md:text-8xl mb-2">{currentOrganism.emoji}</span>
                      )}
                      <h3 className="text-2xl font-bold text-gray-700">{currentOrganism.name}</h3>
                      {/* 生物特徵描述 */}
                      <p className="text-gray-500 text-center mt-3 px-2 text-sm leading-relaxed">
                        {currentOrganism.feature}
                      </p>
                    </div>
                  )}

                  {/* 回饋提示 */}
                  {feedback && (
                    <div className={`absolute top-1/2 -translate-y-1/2 font-bold text-2xl px-6 py-3 rounded-full shadow-xl z-10 
                      ${feedback.type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`}>
                      {feedback.message}
                    </div>
                  )}
                </div>

                {/* 生態系選擇區 */}
                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                  {ECOSYSTEMS.map((eco) => (
                    <div 
                      key={eco.id}
                      onClick={() => handleEcosystemSelect(eco.id)}
                      className={`
                        ${eco.bgClass} border-2 rounded-2xl p-4 cursor-pointer transition-all duration-200
                        flex flex-col items-center justify-start min-h-[140px] shadow-sm hover:shadow-md
                        active:scale-95
                      `}
                    >
                      <div className="text-3xl mb-2">{eco.icon}</div>
                      <h4 className={`font-bold text-lg mb-2 ${eco.textClass}`}>{eco.name}</h4>
                      
                      {/* 已放置的生物小標籤 */}
                      <div className="flex flex-wrap justify-center gap-1 mt-auto">
                        {placedOrganisms[eco.id]?.map(org => (
                          <span key={org.id} className="text-sm bg-white bg-opacity-60 px-2 py-1 rounded border border-white border-opacity-50 text-gray-700">
                            {org.name}
                          </span>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

              </div>
            )}
          </div>
        </div>
      );
    }

    // 將 React 應用渲染到根節點上
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
